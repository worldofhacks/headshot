# GitLab parity for the GitHub test, console, container, secret-scan, and security-tools gates.
stages:
  - test
  - package
  - security

variables:
  POSTGRES_USER: agentforge
  POSTGRES_PASSWORD: local_dev_only
  POSTGRES_DB: agentforge

test:
  stage: test
  image: python:3.12
  services:
    - name: postgres:16
      alias: postgres
  variables:
    DATABASE_URL: postgresql://agentforge:local_dev_only@postgres:5432/agentforge
  script:
    - python -m pip install --upgrade pip
    - python -m pip install -e ".[dev]"
    - ruff check .
    - ruff format --check .
    - PYTHONPATH=src python -m agentforge.evals validate-corpus evals
    - PYTHONPATH=src python -m agentforge.evals detect-duplicate-sequence evals/seeds
    - pytest
    - pytest tests/contract -q
    - bash scripts/wheel_outside_repo_check.sh

console:
  stage: test
  image: node:22.17.1-bookworm-slim
  before_script:
    - export VITE_CLERK_PUBLISHABLE_KEY="pk_test_$(printf 'clerk.example.com$' | base64 | tr -d '\n')"
    - cd console
  script:
    - npm ci --ignore-scripts
    - npm audit --audit-level=high
    - npm run typecheck
    - npm test
    - npm run check:forbidden
    - npm run build
    - npm run check:bundle
    - npx playwright install --with-deps chromium
    - npm run test:browser
    - test -z "$(find dist -type f -name '*.map' -print -quit)"

container:
  stage: package
  image: docker:27.5.1-cli
  services:
    - name: docker:27.5.1-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_NETWORK_MODE: agentforge-ci
    AGENTFORGE_SMOKE_HOST: docker
    CLEAN_DATABASE_URL: postgresql://agentforge:local_dev_only@postgres:5432/agentforge_clean
    UPGRADE_DATABASE_URL: postgresql://agentforge:local_dev_only@postgres:5432/agentforge_upgrade
    READY_DATABASE_URL: postgresql://agentforge:local_dev_only@postgres:5432/agentforge_clean
  before_script:
    - apk add --no-cache bash curl
    - export VITE_CLERK_PUBLISHABLE_KEY="pk_test_$(printf 'clerk.example.com$' | base64 | tr -d '\n')"
  script:
    - docker network create agentforge-ci
    - >-
      docker run -d --name postgres --network agentforge-ci
      -e POSTGRES_USER="$POSTGRES_USER"
      -e POSTGRES_PASSWORD="$POSTGRES_PASSWORD"
      -e POSTGRES_DB="$POSTGRES_DB"
      postgres:16
    - >-
      for i in $(seq 1 30); do
        if docker exec postgres pg_isready -U agentforge -d agentforge; then break; fi;
        if [ "$i" = 30 ]; then docker logs postgres; exit 1; fi;
        sleep 1;
      done
    - docker exec postgres createdb -U agentforge agentforge_clean
    - docker exec postgres createdb -U agentforge agentforge_upgrade
    - >-
      docker build
      --build-arg VITE_CLERK_PUBLISHABLE_KEY="$VITE_CLERK_PUBLISHABLE_KEY"
      -t agentforge:ci .
    - bash scripts/verify_runtime_image.sh agentforge:ci
    - bash scripts/verify_container_migrations.sh agentforge:ci
    - bash scripts/smoke_ready_container.sh agentforge:ci
    - bash scripts/smoke_runtime_container.sh agentforge:ci
    - >-
      docker run --rm --entrypoint python
      -v "$CI_PROJECT_DIR/evals:/corpus:ro" agentforge:ci
      -m agentforge.evals validate-corpus /corpus
    - >-
      docker run --rm --entrypoint python
      -v "$CI_PROJECT_DIR/evals:/corpus:ro" agentforge:ci
      -m agentforge.evals detect-duplicate-sequence /corpus/seeds

secret-scan:
  stage: security
  image: python:3.12
  variables:
    GIT_DEPTH: "0"
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - >-
      curl -sSfL
      https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
      -o /tmp/gitleaks.tar.gz
    - >-
      echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" |
      sha256sum --check --strict
    - tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
    - gitleaks version
    - gitleaks git . --redact --verbose

security-tools:
  stage: security
  image: docker:27.5.1-cli
  services:
    - name: docker:27.5.1-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    ZAP_WORK: "$CI_PROJECT_DIR/.zap"
  before_script:
    - apk add --no-cache bash curl nodejs npm python3 py3-pip
  script:
    - python3 -m pip install --break-system-packages semgrep==1.170.0 pip-audit==2.10.1
    - >-
      timeout 180s semgrep scan --config .semgrep.yml --error --metrics=off
      --timeout 30 --max-target-bytes 1000000
      --json --output semgrep.json src console/src migrations scripts
    - >-
      timeout 180s semgrep scan --config .semgrep.yml --error --metrics=off
      --timeout 30 --max-target-bytes 1000000
      --sarif --output semgrep.sarif src console/src migrations scripts
    - test "$(wc -c < semgrep.json)" -le 10485760
    - test "$(wc -c < semgrep.sarif)" -le 10485760
    - >-
      pip-audit . --strict --progress-spinner=off
      --format=json --output pip-audit.json
    - >-
      timeout 120s npx --yes promptfoo@0.121.19 validate
      -c security-tools/promptfoo/promptfooconfig.yaml
      | tee promptfoo-validate.txt
    - test "$(wc -c < promptfoo-validate.txt)" -le 1048576
    - install -d -m 0777 "$ZAP_WORK"
    - docker network create --internal agentforge-zap-isolated
    - >-
      docker run -d --read-only --cap-drop=ALL --security-opt=no-new-privileges
      --network=agentforge-zap-isolated --name=agentforge-zap-fake
      -v "$CI_PROJECT_DIR/security-tools/zap-fixture:/fixture:ro"
      --entrypoint=python3
      ghcr.io/zaproxy/zaproxy@sha256:c558ee87358911ab17278c70991e856f57793e115d9cd0f88ca475cf82907a1a
      -m http.server 8765 --bind 0.0.0.0 --directory /fixture
    - >-
      for attempt in 1 2 3 4 5; do
        if docker exec agentforge-zap-fake python3 -c "import socket; socket.create_connection(('127.0.0.1', 8765), 1).close()"; then break; fi;
        sleep 1;
      done
    - >-
      timeout 180s docker run --rm --network=agentforge-zap-isolated --read-only --cap-drop=ALL
      --security-opt=no-new-privileges --pids-limit=256 --memory=2g --cpus=2
      --tmpfs /tmp:rw,noexec,nosuid,size=256m
      --tmpfs /home/zap:rw,exec,nosuid,mode=1777,size=512m
      -v "$ZAP_WORK:/zap/wrk:rw"
      ghcr.io/zaproxy/zaproxy@sha256:c558ee87358911ab17278c70991e856f57793e115d9cd0f88ca475cf82907a1a
      zap-baseline.py -t http://agentforge-zap-fake:8765 -J zap.json -m 1 -T 2 -I
      -z "-config spider.maxDuration=1 -config spider.maxDepth=5 -config spider.maxChildren=10 -config scanner.threadPerHost=1"
    - test "$(wc -c < "$ZAP_WORK/zap.json")" -le 10485760
  after_script:
    - docker rm -f agentforge-zap-fake >/dev/null 2>&1 || true
    - docker network rm agentforge-zap-isolated >/dev/null 2>&1 || true
  artifacts:
    name: security-tool-artifacts
    expire_in: 14 days
    when: always
    paths:
      - semgrep.json
      - semgrep.sarif
      - pip-audit.json
      - promptfoo-validate.txt
      - .zap/zap.json
