# GitLab parity for the GitHub test, console, container, secret-scan, and security-tools gates.
stages:
  - test
  - package
  - security

variables:
  POSTGRES_USER: agentforge
  POSTGRES_PASSWORD: local_dev_only
  POSTGRES_DB: agentforge

test:
  stage: test
  image: python:3.12
  services:
    - name: postgres:16
      alias: postgres
  variables:
    DATABASE_URL: postgresql://agentforge:local_dev_only@postgres:5432/agentforge
  script:
    - python -m pip install --upgrade pip
    - python -m pip install -e ".[dev]"
    - ruff check .
    - ruff format --check .
    - PYTHONPATH=src python -m agentforge.evals validate-corpus evals
    - PYTHONPATH=src python -m agentforge.evals detect-duplicate-sequence evals/seeds
    - pytest
    - pytest tests/contract -q
    - bash scripts/wheel_outside_repo_check.sh

console:
  stage: test
  image: node:22.17.1-bookworm-slim
  before_script:
    - export VITE_CLERK_PUBLISHABLE_KEY="pk_test_$(printf 'clerk.example.com$' | base64 | tr -d '\n')"
    - cd console
  script:
    - npm ci --ignore-scripts
    - npm audit --audit-level=high
    - npm run typecheck
    - npm test
    - npm run check:forbidden
    - npm run build
    - npm run check:bundle
    - npx playwright install --with-deps chromium
    - npm run test:browser
    - test -z "$(find dist -type f -name '*.map' -print -quit)"
  artifacts:
    name: tested-console-dist
    expire_in: 1 hour
    paths:
      - console/dist/

container:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor@sha256:c3109d5926a997b100c4343944e06c6b30a6804b2f9abe0994d3de6ef92b028e
    entrypoint: [""]
  dependencies:
    - console
  script:
    - >-
      /kaniko/executor
      --context "dir://$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile.gitlab"
      --destination agentforge:ci
      --no-push
      --tar-path "$CI_PROJECT_DIR/agentforge-ci.tar"
    - /bin/sh scripts/verify_container_archive.sh "$CI_PROJECT_DIR/agentforge-ci.tar"

secret-scan:
  stage: security
  image: python:3.12
  variables:
    GIT_DEPTH: "0"
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - >-
      curl -sSfL
      https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
      -o /tmp/gitleaks.tar.gz
    - >-
      echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" |
      sha256sum --check --strict
    - tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
    - gitleaks version
    - gitleaks git . --redact --verbose

security-tools:
  stage: security
  image: python:3.12.11-bookworm
  variables:
    LLM_TOOL_ARTIFACT_DIR: "$CI_PROJECT_DIR/.llm-security-tools"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends ca-certificates curl xz-utils
    - curl -sSfL https://nodejs.org/dist/v24.4.1/node-v24.4.1-linux-x64.tar.xz -o /tmp/node.tar.xz
    - >-
      echo "7e067b13cd0dc7ee8b239f4ebe1ae54f3bba3a6e904553fcb5f581530eb8306d  /tmp/node.tar.xz" |
      sha256sum --check --strict
    - tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
    - node --version
    - python3 -m venv .scanner-venv
    - .scanner-venv/bin/python -m pip install semgrep==1.170.0 pip-audit==2.10.1
  script:
    - >-
      timeout 180s .scanner-venv/bin/semgrep scan --config .semgrep.yml --error --metrics=off
      --timeout 30 --max-target-bytes 1000000
      --json --output semgrep.json src console/src migrations scripts
    - >-
      timeout 180s .scanner-venv/bin/semgrep scan --config .semgrep.yml --error --metrics=off
      --timeout 30 --max-target-bytes 1000000
      --sarif --output semgrep.sarif src console/src migrations scripts
    - test "$(wc -c < semgrep.json)" -le 10485760
    - test "$(wc -c < semgrep.sarif)" -le 10485760
    - >-
      .scanner-venv/bin/pip-audit . --strict --progress-spinner=off
      --format=json --output pip-audit.json
    - >-
      timeout 120s npx --yes promptfoo@0.121.19 validate
      -c security-tools/promptfoo/promptfooconfig.yaml
      | tee promptfoo-validate.txt
    - test "$(wc -c < promptfoo-validate.txt)" -le 1048576
    - bash scripts/run_offline_llm_tools.sh
  artifacts:
    name: security-tool-artifacts
    expire_in: 14 days
    when: always
    paths:
      - semgrep.json
      - semgrep.sarif
      - pip-audit.json
      - promptfoo-validate.txt
      - .llm-security-tools/

zap-baseline:
  stage: security
  image:
    name: ghcr.io/zaproxy/zaproxy@sha256:c558ee87358911ab17278c70991e856f57793e115d9cd0f88ca475cf82907a1a
    entrypoint: [""]
  variables:
    ZAP_WORK: "$CI_PROJECT_DIR/.zap"
  script:
    - install -d -m 0777 "$ZAP_WORK" /zap/wrk
    - python3 -m http.server 8765 --bind 127.0.0.1 --directory security-tools/zap-fixture > /tmp/zap-fixture.log 2>&1 &
    - fixture_pid=$!
    - trap 'kill "$fixture_pid" >/dev/null 2>&1 || true' EXIT
    - >-
      for attempt in 1 2 3 4 5; do
        if python3 -c "import socket; socket.create_connection(('127.0.0.1', 8765), 1).close()"; then break; fi;
        if [ "$attempt" = 5 ]; then cat /tmp/zap-fixture.log; exit 1; fi;
        sleep 1;
      done
    - >-
      timeout 180s /zap/zap-baseline.py -t http://127.0.0.1:8765 -J zap.json -m 1 -T 2 -I
      -z "-config spider.maxDuration=1 -config spider.maxDepth=5 -config spider.maxChildren=10 -config scanner.threadPerHost=1"
    - cp /zap/wrk/zap.json "$ZAP_WORK/zap.json"
    - test "$(wc -c < "$ZAP_WORK/zap.json")" -le 10485760
  artifacts:
    name: zap-artifact
    expire_in: 14 days
    when: always
    paths:
      - .zap/zap.json
