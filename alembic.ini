# alembic.ini — AgentForge / Adversarial Machine (M2 storage migrations).
#
# The migration package is the SINGLE apply path for the exploit-DB schema, enums, indexes,
# the S3 UNIQUE(campaign_run_id, attempt_id) constraint, and the per-agent DB roles + grants
# (from src/agentforge/storage/roles.sql). ARCHITECTURE.md §6/§7/§12 (D7 expand/contract).
#
# The database URL is resolved at runtime by migrations/env.py from env DATABASE_URL
# (bare postgresql:// is translated to postgresql+psycopg:// for SQLAlchemy 2.x + psycopg3),
# falling back to the local admin DSN. Tests override sqlalchemy.url per throwaway DB via the
# Alembic Config main option (see tests/_db.py). The checked-in value is intentionally blank:
# a usable localhost URL here would override Railway's DATABASE_URL during pre-deploy.

[alembic]
script_location = migrations
prepend_sys_path = src
# Zero-padded, lexically sortable revision filenames: 0001_*.py, 0002_*.py.
version_num_format = %%04d
version_path_separator = os
# Non-legacy path splitting (silences the Alembic DeprecationWarning on every migration run).
path_separator = os
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
