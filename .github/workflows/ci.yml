name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    # AC-4: an ephemeral PostgreSQL the test job can reach. Torn down with the job — no
    # persistence, no real credentials (throwaway local-CI values only, never a secret).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: local_dev_only
          POSTGRES_DB: agentforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentforge -d agentforge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      # Point the suite at the ephemeral service above (AC-4).
      DATABASE_URL: postgresql://agentforge:local_dev_only@localhost:5432/agentforge
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (editable) + dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Eval schema and duplicate validation
        run: |
          PYTHONPATH=src python -m agentforge.evals validate-corpus evals
          PYTHONPATH=src python -m agentforge.evals detect-duplicate-sequence evals/seeds
      - name: Pytest (full suite)
        run: pytest
      - name: Contract tests
        run: pytest tests/contract -q
      - name: Docker build (AC-1 image gate)
        # Gate the container image on every push/PR so AC-1 is no longer only manually
        # verified — a broken Dockerfile fails CI here.
        run: docker build -t agentforge:ci-smoke .

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Gitleaks scan (full history)
        run: gitleaks git . --redact --verbose
