# Local development stack — app + Postgres. LOCAL DEV ONLY.
# spec(M1a:AC-1) spec(M1a:AC-4)
#
# Synthetic data only; no live target is reached from here; no real credentials appear.
# The values below are non-secret LOCAL placeholders — safe defaults for a throwaway dev
# database. Production credentials are NEVER inline: they are resolved as secret
# references by agentforge.config in the production environment only (O1 invariant), and
# this compose file is pinned to environment=local so it cannot reach them.
# Load the developer-owned values explicitly with:
#   docker compose --env-file .env.local up --build
# Only the variables enumerated below enter Web; provider/target values in that file do not.

services:
  postgres:
    image: postgres:16
    environment:
      # Local, non-secret placeholders. Do NOT reuse these anywhere real.
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: local_dev_only
      POSTGRES_DB: agentforge
    ports:
      # Loopback-only publish: the app reaches Postgres over the compose network as
      # postgres:5432; publishing to the host is dev-convenience only, never exposed
      # off-box.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge -d agentforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Public frontend identifier, supplied explicitly by the developer. There is no
        # committed fallback: a missing Clerk build binding must fail instead of producing
        # a console that cannot authenticate.
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?required}
    environment:
      # local environment pins the isolation boundary: this app CANNOT resolve production
      # target credentials (agentforge.config, O1).
      AGENTFORGE_ENVIRONMENT: local
      DATABASE_URL: postgresql://agentforge:local_dev_only@postgres:5432/agentforge
      PORT: ${PORT:?required}
      AGENTFORGE_CONSOLE_DIR: /app/console
      AGENTFORGE_MAX_REQUEST_BYTES: ${AGENTFORGE_MAX_REQUEST_BYTES:?required}
      # Request authentication is fail-closed. Compose supplies no fixture or fallback value;
      # all five bindings must come from the explicitly selected local environment file.
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?required}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY:?required}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:?required}
      CLERK_REQUIRED_ORG_ID: ${CLERK_REQUIRED_ORG_ID:?required}
      CLERK_FRONTEND_API_ORIGIN: ${CLERK_FRONTEND_API_ORIGIN:?required}
    ports:
      # Loopback-only publish: dev-convenience access to the health surface, never exposed
      # off-box.
      - "127.0.0.1:${PORT:?required}:${PORT:?required}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
